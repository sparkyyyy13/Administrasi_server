<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Rifki</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background Glow Animation */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #58a6ff, #bc8cff);
            border-radius: 50%;
            filter: blur(150px);
            top: 20%;
            left: 20%;
            z-index: -1;
            animation: float 6s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        /* Card Container */
        .card {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }

        /* Profile/Icon Placeholder */
        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #21262d, #30363d);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #30363d;
            font-size: 2rem;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            color: #f0f6fc;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h1 span {
            background: linear-gradient(45deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #8b949e;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Button/Link */
        .btn {
            display: inline-block;
            text-decoration: none;
            background: #238636;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
        }

        .btn:hover {
            background: #2ea043;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">🚀</div>
        <h1>Tugas <span>Rifki</span></h1>
        <p>Selamat datang di repositori tugas saya. Halaman ini dibuat untuk mendokumentasikan perkembangan project dan tugas kuliah/sekolah.</p>
        <a href="https://github.com/sparkyyyy13/Administrasi_server" target="_blank" class="btn">Lihat Repositori</a>
    </div>

</body>
</html>
